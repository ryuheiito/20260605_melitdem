# ============================================================
# make_pseudo_aw3d.py 設定ファイル
# ============================================================
# 使い方: python make_pseudo_aw3d.py config_pseudo.yaml
# ============================================================

# --- 必須 ----------------------------------------------------

# ダウンロードした MERIT DEM のパス
dem: ./data/n05e125_dem.tif
# 生成する疑似 AW3D の出力パス
output: ./data/1mtest/n05e120_dem_1m.tif

# --- 切り出し範囲 --------------------------------------------

# 切り出しの中心座標（省略すると DEM の中心を使用）
# 高砂市付近の例
center_lon: 125.6765
center_lat: 7.79

# 切り出しサイズ（正方形）[メートル]
# AW3D の代わりなので数km程度を推奨
size_m: 2000

# --- ノイズ設定 ----------------------------------------------

# ノイズの標準偏差 [m]
# AW3D の垂直精度は約 ±1m なので 0.3〜1.0 程度が自然
noise_std: 0.3

# ノイズの空間スケール [ピクセル]
# 大きいほど滑らかな起伏ノイズになる
noise_scale: 50

# 乱数シード（再現性のために固定）
seed: 42

# --- その他 --------------------------------------------------

nodata: -9999
resampling: bilinear  # nearest / bilinear / cubic
