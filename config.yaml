# ============================================================
# merge_dem.py 設定ファイル
# ============================================================
# 使い方: python merge_dem.py config.yaml
# ============================================================

# --- 必須項目 ------------------------------------------------

melitdem: ./data/n05e125_dem.tif
aw3d:     ./data/1mtest/n05e120_dem_1m.tif
output:   ./output/test   # → _patch_1m.tif / _melitdem_hole.tif が生成される

# --- UTM 設定 ------------------------------------------------

# UTM の EPSG コード（省略すると MELITDEM の中心経度から自動判定）
#
# 日本でよく使うゾーン:
#   EPSG:32651  UTM Zone 51N  120°E〜126°E
#   EPSG:32652  UTM Zone 52N  126°E〜132°E
#   EPSG:32653  UTM Zone 53N  132°E〜138°E  ← 兵庫・大阪・京都など
#   EPSG:32654  UTM Zone 54N  138°E〜144°E  ← 東京・名古屋など
#
# 高砂市（134.8°E）→ Zone 53N → EPSG:32653
utm_epsg: 32651

# --- オプション項目 ------------------------------------------

# AW3D 範囲の外側に加えるバッファ幅 [メートル]
# UTM（メートル単位）で正確に計算されます
# MELITDEM 90m の場合、最低 270m（3ピクセル分）推奨
# tile_size_mを省略してmax_file_gbだけ指定
resolution_m:  2
max_file_gb:   10.0    # デフォルト1GB

# または手動指定（こちらが優先）
tile_size_m:   

buffer_m:      500
blend_width_m: 200
nodata:        -9999


# リサンプリング手法: nearest / bilinear / cubic / lanczos
resampling: cubic
