# config.yaml (設定ファイル)

# 入力ファイルのパス
melitdem: "data/s10e105_dem_utmv5.tif"
aw3d: "data/1mtest/jakarta_1m_corrected.tif"

# 出力先のフォルダ名
output: "output"

# フェザリング設定
buffer_m: 270.0
blend_width_m: 270.0
resolution_m: 2.0
nodata: -9999.0
resampling: "bilinear"

# ----------------------------------------------------
# 出力ファイルサイズ（タイル分割と圧縮）の調整
# ----------------------------------------------------

# ▼ 圧縮方式の指定（deflate, lzw, zstd, None）
# 'deflate' または 'lzw' を指定すると、画質を劣化させずにファイル容量を数分の一に圧縮できます。
compress: "deflate"

# ▼ サイズ調整 A：1辺の距離(メートル)で固定分割したい場合
#tile_size_m: 1000.0

# ▼ サイズ調整 B：1ファイルの「容量上限(GB)」で自動分割したい場合
# ※ 調整Bを使う場合は、上の tile_size_m の行を # でコメントアウトするか削除してください。
max_file_gb: 1  # 1ファイルあたり最大500MB程度になるようにタイルサイズを自動計算